<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>대한민국 도서관 현황 지도</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <main>
        <section class="map-box">
            <!-- JS가 여기에 SVG 지도를 삽입함 (script.js의 init 함수 참고) -->
            <div class="map-wrap" id="map-wrap"></div>
        </section>


        <aside class="sidebar" id="sidebar">
            <div class="sidebar-hint" id="sidebar-hint">
                <span>지역을 클릭하면<br>통계가 표시됩니다</span>
            </div>

            <!-- 지역 클릭 후 통계가 표시되는 영역 (처음엔 숨김) -->
            <div class="sidebar-body" id="sidebar-body" style="display:none">
                <div class="sidebar-title" id="sidebar-title"></div>  <!-- 지역명 -->
                <ul class="type-list" id="type-list"></ul>            <!-- 유형별 도서관 수 -->
                <div class="stat-list" id="stat-list"></div>          <!-- 좌석수·대출권수 -->
            </div>

        </aside>
    </main>

    <!-- 마우스 호버 시 나타나는 툴팁 (CSS position:fixed로 커서를 따라다님) -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-name" id="tooltip-name"></div>   <!-- 지역명 -->
        <div class="tooltip-count" id="tooltip-count"></div> <!-- 도서관 개수 -->
    </div>

    <script src="script.js"></script>
</body>
</html>
